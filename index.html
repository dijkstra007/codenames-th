<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Codenames · เกมสายลับภาษาไทย</title>
<meta name="description" content="เล่น Codenames ภาษาไทยกับเพื่อนบนหน้าจอเดียว สายลับดูกุญแจได้จากแผงด้านล่าง" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Noto+Serif+Thai:wght@700;800&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1a1f'/%3E%3Cpath d='M8 10h16M8 16h16M8 22h10' stroke='%23e63946' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg class="logo" viewBox="0 0 40 40" fill="none" aria-label="Codenames">
      <rect x="2" y="2" width="36" height="36" rx="7" fill="currentColor" opacity="0.08"/>
      <rect x="6" y="8" width="12" height="4" rx="1" fill="#e63946"/>
      <rect x="22" y="8" width="12" height="4" rx="1" fill="#2563eb"/>
      <rect x="6" y="18" width="28" height="4" rx="1" fill="#d4a373"/>
      <rect x="6" y="28" width="8" height="4" rx="1" fill="#2563eb"/>
      <rect x="18" y="28" width="8" height="4" rx="1" fill="#0f0f10"/>
      <rect x="30" y="28" width="4" height="4" rx="1" fill="#e63946"/>
    </svg>
    <div class="brand-text">
      <h1>Codenames</h1>
      <span class="brand-sub">เกมสายลับภาษาไทย</span>
    </div>
  </div>

  <div class="status" id="turnStatus">
    <span class="dot" id="turnDot"></span>
    <span id="turnLabel">กำลังโหลด…</span>
  </div>

  <div class="controls">
    <div class="score" id="score">
      <span class="score-red"><span id="redLeft">9</span></span>
      <span class="score-sep">·</span>
      <span class="score-blue"><span id="blueLeft">8</span></span>
    </div>
    <button class="btn btn-ghost" id="switchTurnBtn" title="สลับทีมที่กำลังเล่น">สลับทีม</button>
    <button class="btn btn-primary" id="newGameBtn">เกมใหม่</button>
  </div>
</header>

<main class="board-wrap">
  <div class="board" id="board"></div>

  <!-- Drag palette: floats above board on desktop, hidden on mobile-in-spymaster to save room -->
  <aside class="palette" aria-label="ลากสีไปวางบนการ์ด">
    <p class="palette-title">ลากสีไปวางบนการ์ด</p>
    <div class="palette-chips">
      <div class="chip chip-red" draggable="true" data-color="red" title="ทีมแดง">แดง</div>
      <div class="chip chip-blue" draggable="true" data-color="blue" title="ทีมน้ำเงิน">น้ำเงิน</div>
      <div class="chip chip-neutral" draggable="true" data-color="neutral" title="คนนอก">กลาง</div>
      <div class="chip chip-assassin" draggable="true" data-color="assassin" title="นักฆ่า">นักฆ่า</div>
      <div class="chip chip-eraser" draggable="true" data-color="erase" title="ลบเครื่องหมาย">ลบ</div>
    </div>
    <p class="palette-hint">แตะการ์ดเพื่อเปิด · ลากสีเพื่อทำเครื่องหมาย · ลากชิป "ลบ" เพื่อเอาออก</p>
  </aside>
</main>

<!-- Spymaster key panel (collapsed by default) -->
<section class="key-panel" id="keyPanel" aria-label="กุญแจสำหรับสายลับ">
  <button class="key-toggle" id="keyToggle" aria-expanded="false" aria-controls="keyContent">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <span id="keyToggleLabel">แสดงกุญแจสายลับ</span>
    <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="m18 15-6-6-6 6"/>
    </svg>
  </button>

  <div class="key-content" id="keyContent" aria-hidden="true">
    <div class="key-header">
      <div class="key-meta">
        <span class="meta-pill meta-red">แดง <strong id="keyRedTotal">9</strong></span>
        <span class="meta-pill meta-blue">น้ำเงิน <strong id="keyBlueTotal">8</strong></span>
        <span class="meta-pill meta-neutral">กลาง <strong>7</strong></span>
        <span class="meta-pill meta-assassin">นักฆ่า <strong>1</strong></span>
      </div>
      <p class="key-warn">⚠︎ ห้ามให้ผู้เล่นคนอื่นเห็น — กดซ่อนก่อนเดินเกม</p>
    </div>
    <div class="key-grid" id="keyGrid"></div>
  </div>
</section>

<!-- Victory overlay -->
<div class="overlay" id="overlay" hidden>
  <div class="overlay-card" id="overlayCard">
    <h2 id="overlayTitle">ทีมแดงชนะ</h2>
    <p id="overlaySub">เปิดการ์ดครบหมดแล้ว</p>
    <button class="btn btn-primary btn-lg" id="overlayNewBtn">เริ่มเกมใหม่</button>
  </div>
</div>

<script src="words.js" type="module"></script>
<script src="app.js" type="module"></script>
</body>
</html>
