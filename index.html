<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Codenames · เกมสายลับภาษาไทย</title>
<meta name="description" content="เล่น Codenames ภาษาไทยกับเพื่อนบนหน้าจอเดียว พลิกกระดานเพื่อดูกุญแจสายลับ" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Noto+Serif+Thai:wght@700;800&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1a1f'/%3E%3Cpath d='M8 10h16M8 16h16M8 22h10' stroke='%23e63946' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg class="logo" viewBox="0 0 40 40" fill="none" aria-label="Codenames">
      <rect x="2" y="2" width="36" height="36" rx="7" fill="currentColor" opacity="0.08"/>
      <rect x="6" y="8" width="12" height="4" rx="1" fill="#e63946"/>
      <rect x="22" y="8" width="12" height="4" rx="1" fill="#2563eb"/>
      <rect x="6" y="18" width="28" height="4" rx="1" fill="#d4a373"/>
      <rect x="6" y="28" width="8" height="4" rx="1" fill="#2563eb"/>
      <rect x="18" y="28" width="8" height="4" rx="1" fill="#0f0f10"/>
      <rect x="30" y="28" width="4" height="4" rx="1" fill="#e63946"/>
    </svg>
    <div class="brand-text">
      <h1>Codenames</h1>
      <span class="brand-sub">เกมสายลับภาษาไทย</span>
    </div>
  </div>

  <div class="turn-switcher" role="group" aria-label="เลือกทีมที่กำลังเล่น">
    <button class="turn-btn turn-red" id="turnRedBtn" data-team="red">
      <span class="turn-dot"></span>
      ทีมแดง
      <span class="turn-count" id="redLeft">9</span>
    </button>
    <button class="turn-btn turn-blue" id="turnBlueBtn" data-team="blue">
      <span class="turn-dot"></span>
      ทีมน้ำเงิน
      <span class="turn-count" id="blueLeft">8</span>
    </button>
  </div>

  <div class="controls">
    <button class="btn btn-ghost" id="shareBtn" title="แชร์กุญแจให้สายลับบนอีกเครื่อง">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/>
        <circle cx="6" cy="12" r="3"/>
        <circle cx="18" cy="19" r="3"/>
        <line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/>
        <line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/>
      </svg>
      <span>แชร์ให้สายลับ</span>
    </button>
    <button class="btn btn-ghost" id="flipBtn" title="พลิกกระดานเพื่อดูกุญแจสายลับ">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span id="flipLabel">ดูกุญแจสายลับ</span>
    </button>
    <button class="btn btn-primary" id="newGameBtn">เกมใหม่</button>
  </div>
</header>

<main class="board-wrap">
  <div class="board-stage" id="boardStage">
    <div class="board-face board-front" id="board" aria-label="กระดานเกม"></div>
    <div class="board-face board-back" id="keyBoard" aria-hidden="true">
      <div class="key-warn-banner">
        ⚠︎ เฉพาะสายลับเท่านั้น — กด "ซ่อนกุญแจ" ก่อนส่งกลับให้ทุกคน
      </div>
      <div class="key-grid" id="keyGrid"></div>
    </div>
  </div>
</main>

<!-- Share modal -->
<div class="overlay" id="shareOverlay" hidden>
  <div class="overlay-card share-card">
    <h2>แชร์ให้สายลับ</h2>
    <p class="share-help">ส่งลิงก์นี้หรือรหัสด้านล่างให้สายลับเปิดในเครื่องอื่น เพื่อดูสีของการ์ดทั้งหมด</p>

    <label class="share-label">ลิงก์สำหรับสายลับ</label>
    <div class="share-row">
      <input type="text" id="shareLinkInput" readonly />
      <button class="btn btn-primary" id="copyLinkBtn">คัดลอกลิงก์</button>
    </div>

    <label class="share-label">หรือคัดลอกรหัส Base64</label>
    <div class="share-row">
      <textarea id="shareCodeInput" readonly rows="3"></textarea>
      <button class="btn btn-ghost" id="copyCodeBtn">คัดลอกรหัส</button>
    </div>

    <div class="share-footer">
      <button class="btn btn-ghost" id="shareCloseBtn">ปิด</button>
    </div>
  </div>
</div>

<!-- Victory overlay -->
<div class="overlay" id="overlay" hidden>
  <div class="overlay-card" id="overlayCard">
    <h2 id="overlayTitle">ทีมแดงชนะ</h2>
    <p id="overlaySub">เปิดการ์ดครบหมดแล้ว</p>
    <button class="btn btn-primary btn-lg" id="overlayNewBtn">เริ่มเกมใหม่</button>
  </div>
</div>

<script src="words.js" type="module"></script>
<script src="app.js" type="module"></script>
</body>
</html>
